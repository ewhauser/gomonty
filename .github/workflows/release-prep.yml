name: release-prep

on:
  workflow_dispatch:
    inputs:
      release_label:
        description: "Optional label for the release-prep branch and PR"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  header-and-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Build header and linux/amd64 archive
        shell: bash
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          scripts/build-go-ffi.sh x86_64-unknown-linux-gnu

      - name: Upload generated header
        uses: actions/upload-artifact@v4
        with:
          name: ffi-header
          path: internal/ffi/include/monty_go_ffi.h

      - name: Upload linux/amd64 archive
        uses: actions/upload-artifact@v4
        with:
          name: ffi-linux-amd64
          path: internal/ffi/lib/linux_amd64/libmonty_go_ffi.a

      - name: Upload Cargo.lock
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lock
          path: Cargo.lock

  archives:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: header-and-linux-amd64
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            artifact_name: ffi-linux-arm64
            artifact_path: internal/ffi/lib/linux_arm64/libmonty_go_ffi.a
          - name: darwin-amd64
            runner: macos-13
            rust_target: x86_64-apple-darwin
            artifact_name: ffi-darwin-amd64
            artifact_path: internal/ffi/lib/darwin_amd64/libmonty_go_ffi.a
          - name: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            artifact_name: ffi-darwin-arm64
            artifact_path: internal/ffi/lib/darwin_arm64/libmonty_go_ffi.a
          - name: windows-amd64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_name: ffi-windows-amd64
            artifact_path: internal/ffi/lib/windows_amd64/monty_go_ffi.lib

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build archive
        shell: bash
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          MONTY_GO_FFI_SKIP_HEADER=1 scripts/build-go-ffi.sh "${{ matrix.rust_target }}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  open-pr:
    runs-on: ubuntu-latest
    needs:
      - header-and-linux-amd64
      - archives
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download header
        uses: actions/download-artifact@v4
        with:
          name: ffi-header
          path: .artifacts/ffi-header

      - name: Download Cargo.lock
        uses: actions/download-artifact@v4
        with:
          name: cargo-lock
          path: .artifacts/cargo-lock

      - name: Download archive artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ffi-*
          path: .artifacts

      - name: Stage tracked artifacts
        shell: bash
        run: |
          mkdir -p \
            internal/ffi/include \
            internal/ffi/lib/darwin_amd64 \
            internal/ffi/lib/darwin_arm64 \
            internal/ffi/lib/linux_amd64 \
            internal/ffi/lib/linux_arm64 \
            internal/ffi/lib/windows_amd64

          cp .artifacts/ffi-header/monty_go_ffi.h internal/ffi/include/monty_go_ffi.h
          cp .artifacts/cargo-lock/Cargo.lock Cargo.lock
          cp .artifacts/ffi-linux-amd64/libmonty_go_ffi.a internal/ffi/lib/linux_amd64/libmonty_go_ffi.a
          cp .artifacts/ffi-linux-arm64/libmonty_go_ffi.a internal/ffi/lib/linux_arm64/libmonty_go_ffi.a
          cp .artifacts/ffi-darwin-amd64/libmonty_go_ffi.a internal/ffi/lib/darwin_amd64/libmonty_go_ffi.a
          cp .artifacts/ffi-darwin-arm64/libmonty_go_ffi.a internal/ffi/lib/darwin_arm64/libmonty_go_ffi.a
          cp .artifacts/ffi-windows-amd64/monty_go_ffi.lib internal/ffi/lib/windows_amd64/monty_go_ffi.lib

          sha256sum \
            Cargo.lock \
            internal/ffi/include/monty_go_ffi.h \
            internal/ffi/lib/darwin_amd64/libmonty_go_ffi.a \
            internal/ffi/lib/darwin_arm64/libmonty_go_ffi.a \
            internal/ffi/lib/linux_amd64/libmonty_go_ffi.a \
            internal/ffi/lib/linux_arm64/libmonty_go_ffi.a \
            internal/ffi/lib/windows_amd64/monty_go_ffi.lib \
            > internal/ffi/checksums.txt

      - name: Prepare branch metadata
        shell: bash
        run: |
          label="${{ github.event.inputs.release_label }}"
          if [[ -z "$label" ]]; then
            label="run-${{ github.run_id }}"
          fi
          safe_label="$(echo "$label" | tr '[:space:]' '-' | tr -cd '[:alnum:]._/-')"
          branch="release-prep/$safe_label"
          echo "BRANCH_NAME=$branch" >> "$GITHUB_ENV"
          echo "PR_TITLE=Release prep: $label" >> "$GITHUB_ENV"

      - name: Commit and push changes
        shell: bash
        run: |
          if ! git status --short -- Cargo.lock internal/ffi | grep -q .; then
            echo "No artifact updates detected; skipping PR creation."
            echo "SKIP_PR=1" >> "$GITHUB_ENV"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH_NAME"
          git add Cargo.lock internal/ffi/include/monty_go_ffi.h internal/ffi/lib internal/ffi/checksums.txt
          git commit -m "Prepare release artifacts"
          git push --set-upstream origin "$BRANCH_NAME"

      - name: Open release-prep PR
        if: env.SKIP_PR != '1'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${process.env.BRANCH_NAME}`;
            const base = context.payload.repository.default_branch;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              head,
              base,
              state: "open",
            });

            if (existing.data.length > 0) {
              core.info(`PR already exists: ${existing.data[0].html_url}`);
              return;
            }

            const body = [
              "This PR was created by the `release-prep` workflow.",
              "",
              "Updated artifacts:",
              "- `Cargo.lock`",
              "- `internal/ffi/include/monty_go_ffi.h`",
              "- `internal/ffi/lib/...`",
              "- `internal/ffi/checksums.txt`",
            ].join("\n");

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title: process.env.PR_TITLE,
              body,
            });

            core.info(`Created PR: ${pr.data.html_url}`);
