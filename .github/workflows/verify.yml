name: verify

on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  go-pure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build native shared library
        shell: bash
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          MONTY_GO_FFI_SKIP_HEADER=1 scripts/build-go-ffi.sh x86_64-unknown-linux-gnu

      - name: Run CGO-disabled tests
        env:
          CGO_ENABLED: "0"
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Smoke test example module
        shell: bash
        run: |
          cd examples
          CGO_ENABLED=0 go run ./cmd/example

  platform-verify:
    name: verify ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            run_go_tests: true
            build_only_note: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            run_go_tests: true
            build_only_note: ""
          - name: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            run_go_tests: true
            build_only_note: ""
          - name: windows-amd64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            run_go_tests: true
            build_only_note: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build native shared library
        shell: bash
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          MONTY_GO_FFI_SKIP_HEADER=1 scripts/build-go-ffi.sh "${{ matrix.rust_target }}"

      - name: Run Go tests
        if: matrix.run_go_tests
        env:
          CGO_ENABLED: "0"
        run: go test ./...

      - name: Build-only verification note
        if: ${{ !matrix.run_go_tests }}
        run: echo "${{ matrix.build_only_note }}"

  verify-musl-amd64:
    name: verify linux-musl-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build native shared library in musl container
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            rust:1.94-alpine3.21 \
            sh -c '
              set -eux
              apk add --no-cache bash build-base python3
              host="$(rustc -vV | sed -n "s/^host: //p")"
              test "$host" = "x86_64-unknown-linux-musl"
              export PYO3_PYTHON="$(command -v python3)"
              export MONTY_GO_FFI_MUSL_NATIVE=1
              MONTY_GO_FFI_SKIP_HEADER=1 bash scripts/build-go-ffi.sh x86_64-unknown-linux-musl
            '

      - name: Build-only verification note
        run: echo "Musl/Alpine shared libraries are build-verified in a musl-native container; native Go tests are not run on this workflow."

  verify-musl-arm64:
    name: verify linux-musl-arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build native shared library in musl container
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            rust:1.94-alpine3.21 \
            sh -c '
              set -eux
              apk add --no-cache bash build-base python3
              host="$(rustc -vV | sed -n "s/^host: //p")"
              test "$host" = "aarch64-unknown-linux-musl"
              export PYO3_PYTHON="$(command -v python3)"
              export MONTY_GO_FFI_MUSL_NATIVE=1
              MONTY_GO_FFI_SKIP_HEADER=1 bash scripts/build-go-ffi.sh aarch64-unknown-linux-musl
            '

      - name: Build-only verification note
        run: echo "Musl/Alpine shared libraries are build-verified in a musl-native container; native Go tests are not run on this workflow."
