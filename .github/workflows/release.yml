name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version with a leading v, for example v0.0.9"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  header-and-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release inputs
        shell: bash
        run: |
          test "${GITHUB_REF_NAME}" = "main"
          version="${{ github.event.inputs.version }}"
          [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Build header and linux/amd64 shared library
        shell: bash
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          scripts/build-go-ffi.sh x86_64-unknown-linux-gnu

      - name: Upload generated header
        uses: actions/upload-artifact@v4
        with:
          name: ffi-header
          path: internal/ffi/include/monty_go_ffi.h

      - name: Upload linux/amd64 shared library
        uses: actions/upload-artifact@v4
        with:
          name: ffi-linux-amd64
          path: internal/ffi/lib/linux_amd64/libmonty_go_ffi.so

      - name: Upload Cargo.lock
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lock
          path: Cargo.lock

  shared-libraries:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: header-and-linux-amd64
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            artifact_name: ffi-linux-arm64
            artifact_path: internal/ffi/lib/linux_arm64/libmonty_go_ffi.so
          - name: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            artifact_name: ffi-darwin-arm64
            artifact_path: internal/ffi/lib/darwin_arm64/libmonty_go_ffi.dylib
          - name: windows-amd64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_name: ffi-windows-amd64
            artifact_path: internal/ffi/lib/windows_amd64/monty_go_ffi.dll

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build shared library
        shell: bash
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          MONTY_GO_FFI_SKIP_HEADER=1 scripts/build-go-ffi.sh "${{ matrix.rust_target }}"

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  musl-shared-library-amd64:
    name: build linux-amd64-musl
    runs-on: ubuntu-latest
    needs: header-and-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Build shared library in musl container
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            rust:1.94-alpine3.21 \
            sh -c '
              set -eux
              apk add --no-cache bash build-base python3
              host="$(rustc -vV | sed -n "s/^host: //p")"
              test "$host" = "x86_64-unknown-linux-musl"
              export PYO3_PYTHON="$(command -v python3)"
              export MONTY_GO_FFI_MUSL_NATIVE=1
              MONTY_GO_FFI_SKIP_HEADER=1 bash scripts/build-go-ffi.sh x86_64-unknown-linux-musl
            '

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: ffi-linux-amd64-musl
          path: internal/ffi/lib/linux_amd64_musl/libmonty_go_ffi.so

  musl-shared-library-arm64:
    name: build linux-arm64-musl
    runs-on: ubuntu-24.04-arm
    needs: header-and-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Build shared library in musl container
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            rust:1.94-alpine3.21 \
            sh -c '
              set -eux
              apk add --no-cache bash build-base python3
              host="$(rustc -vV | sed -n "s/^host: //p")"
              test "$host" = "aarch64-unknown-linux-musl"
              export PYO3_PYTHON="$(command -v python3)"
              export MONTY_GO_FFI_MUSL_NATIVE=1
              MONTY_GO_FFI_SKIP_HEADER=1 bash scripts/build-go-ffi.sh aarch64-unknown-linux-musl
            '

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: ffi-linux-arm64-musl
          path: internal/ffi/lib/linux_arm64_musl/libmonty_go_ffi.so

  publish:
    runs-on: ubuntu-latest
    needs:
      - header-and-linux-amd64
      - shared-libraries
      - musl-shared-library-amd64
      - musl-shared-library-arm64
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/go.sum

      - name: Download header
        uses: actions/download-artifact@v4
        with:
          name: ffi-header
          path: .artifacts/ffi-header

      - name: Download Cargo.lock
        uses: actions/download-artifact@v4
        with:
          name: cargo-lock
          path: .artifacts/cargo-lock

      - name: Download shared library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ffi-*
          path: .artifacts

      - name: Prepare release tree
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          version_no_v="${version#v}"

          git fetch --tags origin
          previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)"
          if git rev-parse --verify --quiet "refs/tags/$version" >/dev/null; then
            echo "Tag $version already exists" >&2
            exit 1
          fi
          echo "PREVIOUS_TAG=$previous_tag" >> "$GITHUB_ENV"

          sed -i -E '0,/^version = "[^"]+"/s//version = "'"$version_no_v"'"/' Cargo.toml

          find internal/ffi/lib -type f \( -name '*.a' -o -name '*.lib' \) -delete

          mkdir -p \
            internal/ffi/include \
            internal/ffi/lib/darwin_arm64 \
            internal/ffi/lib/linux_amd64 \
            internal/ffi/lib/linux_arm64 \
            internal/ffi/lib/linux_amd64_musl \
            internal/ffi/lib/linux_arm64_musl \
            internal/ffi/lib/windows_amd64

          cp .artifacts/ffi-header/monty_go_ffi.h internal/ffi/include/monty_go_ffi.h
          cp .artifacts/cargo-lock/Cargo.lock Cargo.lock
          cp .artifacts/ffi-linux-amd64/libmonty_go_ffi.so internal/ffi/lib/linux_amd64/libmonty_go_ffi.so
          cp .artifacts/ffi-linux-arm64/libmonty_go_ffi.so internal/ffi/lib/linux_arm64/libmonty_go_ffi.so
          cp .artifacts/ffi-linux-amd64-musl/libmonty_go_ffi.so internal/ffi/lib/linux_amd64_musl/libmonty_go_ffi.so
          cp .artifacts/ffi-linux-arm64-musl/libmonty_go_ffi.so internal/ffi/lib/linux_arm64_musl/libmonty_go_ffi.so
          cp .artifacts/ffi-darwin-arm64/libmonty_go_ffi.dylib internal/ffi/lib/darwin_arm64/libmonty_go_ffi.dylib
          cp .artifacts/ffi-windows-amd64/monty_go_ffi.dll internal/ffi/lib/windows_amd64/monty_go_ffi.dll

          sha256sum \
            Cargo.lock \
            internal/ffi/include/monty_go_ffi.h \
            internal/ffi/lib/darwin_arm64/libmonty_go_ffi.dylib \
            internal/ffi/lib/linux_amd64/libmonty_go_ffi.so \
            internal/ffi/lib/linux_arm64/libmonty_go_ffi.so \
            internal/ffi/lib/linux_amd64_musl/libmonty_go_ffi.so \
            internal/ffi/lib/linux_arm64_musl/libmonty_go_ffi.so \
            internal/ffi/lib/windows_amd64/monty_go_ffi.dll \
            > internal/ffi/checksums.txt

      - name: Validate release tree
        shell: bash
        run: |
          CGO_ENABLED=0 go test ./...
          go vet ./...
          (
            cd examples
            CGO_ENABLED=0 go run ./cmd/example
          )

      - name: Commit, tag, and push
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock internal/ffi/include/monty_go_ffi.h internal/ffi/lib internal/ffi/checksums.txt
            git commit -m "Release $version"
          fi

          git tag "$version"
          git push origin HEAD:main
          git push origin "$version"

      - name: Create GitHub release
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          notes_file="$(mktemp)"

          {
            echo "## Changes"
            echo
            if [ -n "${PREVIOUS_TAG:-}" ]; then
              echo "Compare: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${version}"
              echo
              git log --reverse --format="- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" "${PREVIOUS_TAG}..HEAD"
            else
              echo "Initial release."
              echo
              git log --reverse --format="- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))"
            fi
          } > "$notes_file"

          gh release create "$version" \
            --title "$version" \
            --notes-file "$notes_file" \
            internal/ffi/lib/darwin_arm64/libmonty_go_ffi.dylib \
            internal/ffi/lib/linux_amd64/libmonty_go_ffi.so \
            internal/ffi/lib/linux_amd64_musl/libmonty_go_ffi.so \
            internal/ffi/lib/linux_arm64/libmonty_go_ffi.so \
            internal/ffi/lib/linux_arm64_musl/libmonty_go_ffi.so \
            internal/ffi/lib/windows_amd64/monty_go_ffi.dll \
            internal/ffi/checksums.txt

      - name: Warm the Go module proxy
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          GOPROXY=https://proxy.golang.org go list -m "github.com/${{ github.repository }}@$version"
